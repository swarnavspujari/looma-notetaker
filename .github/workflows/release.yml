name: Release

# Builds installers for Windows (NSIS), macOS (.app/.dmg, both architectures)
# and Linux (AppImage + .deb) on every version tag and attaches them to a
# GitHub Release. Binaries are UNSIGNED — see README "Install Looma" for the
# SmartScreen/Gatekeeper notes shipped to users.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Bundle (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            bundles: |
              src-tauri/target/release/bundle/nsis/*.exe
          - name: macos-arm64
            os: macos-latest
            bundles: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: macos-x64
            os: macos-13
            bundles: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: linux-x64
            os: ubuntu-22.04
            bundles: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libasound2-dev libpulse-dev \
            libssl-dev libxdo-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      # The lockfiles were generated on Windows and npm's optional-deps bug
      # (npm/cli#4828) leaves other platforms' native bindings out of them —
      # even npm install trusts the broken tree. Resolve fresh on this OS.
      - name: Install JS dependencies (fresh resolve — npm/cli#4828)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          rm -f package-lock.json frontend/package-lock.json
          npm install --no-audit --no-fund
          npm --prefix frontend install --no-audit --no-fund

      - name: Install JS dependencies
        if: runner.os == 'Windows'
        run: |
          npm ci
          npm --prefix frontend ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # tauri build runs beforeBuildCommand (frontend build + prepare-sidecars)
      - name: Build installers
        run: npx tauri build

      - name: Rename artifacts with target suffix
        shell: bash
        run: |
          mkdir -p dist-upload
          shopt -s nullglob
          while IFS= read -r pat; do
            [ -z "$pat" ] && continue
            for f in $pat; do
              base=$(basename "$f")
              stem="${base%.*}"
              ext="${base##*.}"
              cp "$f" "dist-upload/${stem}-${{ matrix.name }}.${ext}"
            done
          done <<< "${{ matrix.bundles }}"
          ls -la dist-upload/

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: dist-upload/*
          fail_on_unmatched_files: true
