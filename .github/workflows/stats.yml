name: Download stats

on:
  schedule:
    - cron: "17 6 * * *" # daily, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stats
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Collect release + traffic stats
        env:
          # STATS_TOKEN (fine-grained PAT, Administration: read) unlocks the
          # traffic API; without it the run still works, minus traffic numbers.
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/collect-stats.mjs
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore(stats): daily download snapshot [skip ci]"
          git push
