name: CI

on:
  push:
    branches: ["main", "m*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Lint, test & build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install JS dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Frontend lint
        run: |
          npm --prefix frontend run lint
          npm --prefix frontend run format:check

      - name: Frontend typecheck & build
        run: npm --prefix frontend run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # tauri-build validates externalBin existence at compile time, so the
      # looma-mcp sidecar must be staged before any cargo build/check
      - name: Stage sidecar binaries
        run: npm run prepare-sidecars

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --workspace

      - name: Build
        run: cargo build --workspace

  # macOS / Linux: the app must compile and pass tests on every OS we ship.
  # Capture backends degrade gracefully there until the platform impls land.
  build-cross:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libasound2-dev \
            libssl-dev libxdo-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      # npm ci with a Windows-generated lockfile misses platform-specific
      # optional native bindings (npm/cli#4828) — install resolves them.
      - name: Install JS dependencies
        run: |
          npm install --no-audit --no-fund
          npm --prefix frontend install --no-audit --no-fund

      - name: Frontend build
        run: npm --prefix frontend run build

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Stage sidecar binaries
        run: npm run prepare-sidecars

      - name: Unit tests
        run: cargo test --workspace

      - name: Build
        run: cargo build --workspace
